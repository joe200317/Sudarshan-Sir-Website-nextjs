name: Deploy to GoDaddy VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            export PATH="/opt/cpanel/ea-nodejs20/bin:$PATH"

            cd "${{ secrets.VPS_REPO_PATH }}"
            git fetch origin main
            git reset --hard origin/main

            # --- Backend ---
            cd backend
            npm ci
            npm run build
            pm2 restart sudarshan-backend
            cd ..

            # --- Frontend ---
            cd frontend
            npm ci
            npm run build
            # Cached workshop pages hardcode this build's hashed CSS/JS chunk
            # filenames. Those filenames change on every build, and
            # .workshop-cache/ isn't tracked by git so `reset --hard` doesn't
            # touch it — stale cached pages would keep pointing at chunks
            # this build just deleted, breaking their styling/JS. Clear it so
            # every workshop page regenerates fresh against the new build.
            rm -rf .workshop-cache
            pm2 restart sudarshan-frontend
