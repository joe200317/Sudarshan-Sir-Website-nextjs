name: Deploy to GoDaddy VPS (cPanel)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.VPS_REPO_PATH }}"
            git fetch origin main
            git reset --hard origin/main

            # --- Backend ---
            source "${{ secrets.VPS_BACKEND_VENV }}/bin/activate"
            cd backend
            npm ci
            npm run build
            deactivate
            mkdir -p tmp && touch tmp/restart.txt
            cd ..

            # --- Frontend ---
            source "${{ secrets.VPS_FRONTEND_VENV }}/bin/activate"
            cd frontend
            npm ci
            npm run build
            deactivate
            mkdir -p tmp && touch tmp/restart.txt
